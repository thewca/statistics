queries:
  - showPositions: true
    keys:
      - World record
    positionTieBreakerIndex: 2
    headers:
      - Days
      - Event
      - Result
      - Type
      - Person
      - Competition
    sqlQuery: |-
      with
        ordered_wrs as (
          select
            c.start_date,
            event_id,
            'Single' record_type,
            best record,
            person_id,
            r.person_name,
            c.id competition_id,
            c.name competition,
            row_number() over (
              partition by
                event_id
              order by
                c.start_date desc
            ) rn
          from
            results r
            inner join competitions c on r.competition_id = c.id
          where
            regional_single_record = 'WR'
          union all
          select
            c.start_date,
            event_id,
            'Average' record_type,
            best record,
            person_id,
            r.person_name,
            c.id competition_id,
            c.name competition,
            row_number() over (
              partition by
                event_id
              order by
                c.start_date desc
            ) rn
          from
            results r
            inner join competitions c on r.competition_id = c.id
          where
            regional_average_record = 'WR'
        ),
        current_wrs as (
          select
            *
          from
            ordered_wrs
          where
            rn = 1
        )
      select
        datediff (current_date, start_date) days,
        e.name,
        wca_statistics_time_format (record, event_id, record_type) record,
        record_type,
        wca_statistics_person_link_format (person_id, person_name),
        wca_statistics_competition_link_format (competition_id, competition)
      from
        current_wrs cw
        inner join events e on e.id = cw.event_id
      where
        e.rank < 900
      order by
        1 desc,
        e.rank
      limit
        20
  - showPositions: true
    keys:
      - Continental record
    positionTieBreakerIndex: 2
    headers:
      - Days
      - Event
      - Result
      - Type
      - Region
      - Person
      - Competition
    sqlQuery: |-
      with
        ordered_records as (
          select
            c.start_date,
            event_id,
            'Single' record_type,
            best record,
            person_id,
            r.person_name,
            c.id competition_id,
            c.name competition,
            ctn.name region,
            row_number() over (
              partition by
                event_id,
                continent_id
              order by
                c.start_date desc
            ) rn
          from
            results r
            inner join competitions c on r.competition_id = c.id
            inner join countries ct on ct.id = r.country_id
            inner join continents ctn on ctn.id = ct.continent_id
          where
            regional_single_record is not null
            and regional_single_record not in ('WR', 'NR')
          union all
          select
            c.start_date,
            event_id,
            'Average' record_type,
            best record,
            person_id,
            r.person_name,
            c.id competition_id,
            c.name competition,
            ctn.name region,
            row_number() over (
              partition by
                event_id,
                continent_id
              order by
                c.start_date desc
            ) rn
          from
            results r
            inner join competitions c on r.competition_id = c.id
            inner join countries ct on ct.id = r.country_id
            inner join continents ctn on ctn.id = ct.continent_id
          where
            regional_average_record is not null
            and regional_average_record not in ('WR', 'NR')
        ),
        current_records as (
          select
            *
          from
            ordered_records
          where
            rn = 1
        )
      select
        datediff (current_date, start_date) days,
        e.name,
        wca_statistics_time_format (record, event_id, record_type) record,
        record_type,
        region,
        wca_statistics_person_link_format (person_id, person_name),
        wca_statistics_competition_link_format (competition_id, competition)
      from
        current_records cw
        inner join events e on e.id = cw.event_id
      where
        e.rank < 900
      order by
        1 desc,
        e.rank
      limit
        20
